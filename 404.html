<style>
  /* Scoped to 404.html — minimal centered error layout */
  .error-page {
    min-height: calc(100vh - var(--header-height));
    display: flex;
    align-items: center;
    padding-block: 96px;
  }
  .error-content {
    max-width: 640px;
    margin-inline: auto;
    text-align: center;
  }
  .error-illustration {
    position: relative;
    width: 260px;
    margin: 0 auto 40px;
  }
  .error-illustration img {
    border-radius: var(--radius-lg);
    aspect-ratio: 1 / 1;
    object-fit: cover;
  }
  .error-code {
    font-size: clamp(4rem, 8vw, 7rem);
    font-weight: 700;
    line-height: 1;
    color: var(--color-red);
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  .error-content .lede {
    color: var(--color-text-muted);
    margin: 16px auto 32px;
    max-width: 480px;
  }
  .error-actions {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 16px;
  }
  @media (max-width: 599px) {
    .error-illustration { width: 180px; }
  }
</style>
